        }

        .social-links {

        li>a::after {
            content: "";
            display: block;
            margin: auto;
            height: 3px;
            width: 0;
            top: 5px;
            background: transparent;
            transition: all 0.3s;

        }

        li>a:hover::after,
        li>a.active-nav::after {
            width: 100%;
            background: blue;
        }

        .background {

            display:

            top: 0;

            z-index: 0;
        }

        body {
